<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lukasz Siemaszko</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafafa;
      --text: #111;
      --muted: #888;
      --accent: #2563eb;
      --border: #e5e5e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      max-width: 480px;
      width: 100%;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      width: 2rem;
      height: 2px;
      background: var(--border);
      margin-bottom: 2rem;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #333;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.15s, color 0.15s;
    }

    .links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <p class="label">AI Product Manager</p>
    <h1>Lukasz<br>Siemaszko</h1>
    <p class="title">Head of Product</p>
    <div class="divider"></div>
    <p class="bio">
      Building products at the intersection of AI and human experience.
      Focused on shipping things that matter.
    </p>
    <nav class="links">
      <a href="mailto:hello@lukasz.pm">Email</a>
      <a href="https://linkedin.com/in/lukaszsiemaszko" target="_blank" rel="noopener">LinkedIn</a>
    </nav>
  </main>
</body>
</html>
